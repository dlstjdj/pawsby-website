<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Activated — Pawsby</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --sub: #636366;
      --purple: #534AB7;
      --purple-dark: #443da0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card: #2c2c2e;
        --text: #f2f2f7;
        --sub: #aeaeb2;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .check-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #34c759;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .check-wrap::after {
      content: "";
      display: block;
      width: 14px;
      height: 26px;
      border: 4px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -4px);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 15px; color: var(--sub); line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: var(--purple);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--purple-dark); }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-wrap"></div>
    <h1>Subscription Activated! 🎉</h1>
    <p>Your Pawsby subscription is now active.<br>You can close this window.</p>
    <a class="btn" href="ai-pet://subscription/refresh">Open Pawsby</a>
  </div>
  <script>
    setTimeout(function() {
      window.location.href = "ai-pet://subscription/refresh";
    }, 300);
  </script>
</body>
</html>
