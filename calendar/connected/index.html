<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Connected — Pawsby</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --sub: #636366;
      --blue: #3B82F6;
      --blue-dark: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card: #2c2c2e;
        --text: #f2f2f7;
        --sub: #aeaeb2;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 15px; color: var(--sub); line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--blue-dark); }
    .btn[aria-disabled="true"] {
      opacity: 0.4;
      pointer-events: none;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <polyline points="9 16 11 18 15 14"/>
      </svg>
    </div>
    <h1>Calendar Connected! 📅</h1>
    <p>Your Google Calendar is now connected to Pawsby.<br>You can close this window.</p>
    <a class="btn" id="openBtn" aria-disabled="true" tabindex="-1">Open Pawsby</a>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var raw = params.get('deeplink');
      if (raw) {
        try {
          var dl = decodeURIComponent(raw);
          if (dl.startsWith('ai-pet://')) {
            var btn = document.getElementById('openBtn');
            btn.href = dl;
            btn.removeAttribute('aria-disabled');
            btn.removeAttribute('tabindex');
            setTimeout(function() { window.location.href = dl; }, 300);
          }
        } catch(e) {}
      }
    })();
  </script>
</body>
</html>
